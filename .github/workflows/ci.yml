name: CI

on:
  push:
  pull_request:

env:
  MPEG_O_TAG: v1.0.0
  MPEG_O_REPO: DTW-Thalion/MPEG-O

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve MPEG-O tag SHA
        id: mpeg_o_sha
        run: |
          SHA=$(git ls-remote "https://github.com/${MPEG_O_REPO}.git" "refs/tags/${MPEG_O_TAG}" | cut -f1)
          if [ -z "$SHA" ]; then echo "failed to resolve ${MPEG_O_TAG}" >&2; exit 1; fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "MPEG-O ${MPEG_O_TAG} -> $SHA"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Cache pip wheel directory (keyed on MPEG-O tag SHA)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py${{ matrix.python-version }}-mpeg-o-${{ steps.mpeg_o_sha.outputs.sha }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py${{ matrix.python-version }}-mpeg-o-${{ steps.mpeg_o_sha.outputs.sha }}-
            pip-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Alembic round-trip
        env:
          MPGO_MCP_DB_URL: sqlite:///./ci.db
        run: |
          alembic upgrade head
          alembic downgrade base
          rm -f ci.db

      - name: Pytest
        run: pytest -q
